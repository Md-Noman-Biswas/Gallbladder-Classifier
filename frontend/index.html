<script>

const API_URL = "https://noman2110014-gallbladder-classifier.hf.space";

let selectedFile = null;

const dropZone    = document.getElementById('drop-zone');
const fileInput   = document.getElementById('file-input');
const previewWrap = document.getElementById('preview-wrap');
const previewImg  = document.getElementById('preview-img');
const fileNameEl  = document.getElementById('file-name');
const runBtn      = document.getElementById('run-btn');


// Check API status
async function checkStatus() {

  const apiUrl = API_URL;

  try {

    const res = await fetch(`${apiUrl}/`);

    if (res.ok) {

      document.getElementById('status-dot').classList.add('online');
      document.getElementById('status-label').textContent = 'online';

    } else {

      throw new Error();

    }

  } catch {

    document.getElementById('status-dot').classList.remove('online');
    document.getElementById('status-label').textContent = 'offline';

  }

}

checkStatus();


// File handling
fileInput.addEventListener('change', e => loadFile(e.target.files[0]));

dropZone.addEventListener('dragover', e => {

  e.preventDefault();
  dropZone.classList.add('drag-over');

});

dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));

dropZone.addEventListener('drop', e => {

  e.preventDefault();
  dropZone.classList.remove('drag-over');
  loadFile(e.dataTransfer.files[0]);

});


document.getElementById('clear-btn').addEventListener('click', () => {

  selectedFile = null;

  previewWrap.style.display = 'none';
  dropZone.style.display = 'block';

  fileInput.value = '';

  runBtn.disabled = true;

  clearResults();

});


function loadFile(file) {

  if (!file || !file.type.startsWith('image/')) return;

  selectedFile = file;

  const reader = new FileReader();

  reader.onload = e => {

    previewImg.src = e.target.result;

    previewWrap.style.display = 'block';
    dropZone.style.display = 'none';

    fileNameEl.textContent =
      file.name + ' · ' + (file.size / 1024).toFixed(0) + ' KB';

    runBtn.disabled = false;

  };

  reader.readAsDataURL(file);

}


// Inference
runBtn.addEventListener('click', async () => {

  if (!selectedFile) return;

  const apiUrl = API_URL;

  setLoading(true);
  clearResults();

  const formData = new FormData();
  formData.append('file', selectedFile);

  try {

    showStatus('info', 'Running GAN denoising + ViT classification…');

    const res = await fetch(`${apiUrl}/predict`, {

      method: 'POST',
      body: formData

    });

    if (!res.ok) throw new Error(`Server error ${res.status}`);

    showResults(await res.json());

    hideStatus();
    checkStatus();

  }

  catch (err) {

    showStatus('error', err.message || 'Request failed — server issue');

  }

  finally {

    setLoading(false);

  }

});


function setLoading(on) {

  runBtn.disabled = on;

  runBtn.innerHTML = on
    ? '<div class="spinner"></div> Analysing…'
    : 'Analyse image';

}


function showStatus(type, msg) {

  const el = document.getElementById('status');

  el.className = type;
  el.textContent = msg;

}


function hideStatus() {

  const el = document.getElementById('status');

  el.className = '';
  el.style.display = 'none';

}


function clearResults() {

  document.getElementById('empty-state').style.display = 'block';

  document.getElementById('img-comparison').classList.remove('visible');
  document.getElementById('pred-block').classList.remove('visible');

  document.getElementById('prob-bars').innerHTML = '';

}


function showResults(data) {

  document.getElementById('empty-state').style.display = 'none';

  if (data.input_image && data.denoised_image) {

    document.getElementById('input-out').src = data.input_image;
    document.getElementById('denoised-out').src = data.denoised_image;

    document.getElementById('img-comparison').classList.add('visible');

  }

  document.getElementById('pred-class').textContent = data.prediction;

  document.getElementById('pred-block').classList.add('visible');


  const container = document.getElementById('prob-bars');
  container.innerHTML = '';

  data.probabilities.forEach((item, i) => {

    const pct = (item.probability * 100).toFixed(1);
    const top = i === 0;

    const row = document.createElement('div');

    row.className = 'prob-row';
    row.style.animationDelay = `${i * 45}ms`;

    row.innerHTML = `
      <div class="prob-name${top ? ' top' : ''}" title="${item.class}">
      ${item.class}
      </div>

      <div class="prob-track">
      <div class="prob-fill${top ? ' top' : ''}" style="width:${pct}%"></div>
      </div>

      <div class="prob-val${top ? ' top' : ''}">
      ${pct}%
      </div>
    `;

    container.appendChild(row);

  });

}

</script>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gallbladder AI Classifier</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f5f2ee;
      --white:     #ffffff;
      --surface:   #faf9f7;
      --border:    #e2ddd8;
      --border2:   #ccc8c2;
      --ink:       #1a1714;
      --ink2:      #5a534c;
      --ink3:      #9b9189;
      --accent:    #c8472a;
      --accent2:   #e05a3a;
      --success:   #2d7a4f;
      --tag-bg:    #f0ebe4;
      --serif:     'Fraunces', serif;
      --mono:      'DM Mono', monospace;
      --sans:      'Outfit', sans-serif;
      --radius:    14px;
      --shadow:    0 2px 12px rgba(26,23,20,0.07), 0 1px 3px rgba(26,23,20,0.05);
      --shadow-lg: 0 8px 40px rgba(26,23,20,0.10), 0 2px 8px rgba(26,23,20,0.06);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 0 48px;
      height: 64px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 34px; height: 34px;
      background: var(--ink);
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px;
      flex-shrink: 0;
    }

    .logo-text {
      font-family: var(--serif);
      font-size: 1.1rem;
      font-weight: 400;
      color: var(--ink);
      letter-spacing: -0.01em;
    }

    .header-divider {
      width: 1px; height: 24px;
      background: var(--border);
      margin: 0 4px;
    }

    .header-sub {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--ink3);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #ccc;
      transition: background 0.3s;
    }
    .status-dot.online { background: var(--success); box-shadow: 0 0 0 3px rgba(45,122,79,0.15); }

    .status-label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--ink3);
    }

    /* ── MAIN LAYOUT ── */
    main {
      flex: 1;
      max-width: 1160px;
      margin: 0 auto;
      width: 100%;
      padding: 48px 32px;
      display: grid;
      grid-template-columns: 400px 1fr;
      gap: 32px;
      align-items: start;
    }

    /* ── CARD ── */
    .card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card-header {
      padding: 18px 24px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card-title {
      font-family: var(--mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--ink3);
    }

    .card-body { padding: 24px; }

    /* ── API ROW ── */
    .api-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
      background: var(--tag-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
    }

    /* <<-- HIDE THE VISIBLE API FIELD BUT LEAVE IT IN THE DOM FOR JS -- */
    .api-row { display: none; }

    .api-label {
      font-family: var(--mono);
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--ink3);
      flex-shrink: 0;
    }

    .api-row input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--ink);
      font-family: var(--mono);
      font-size: 11px;
      outline: none;
    }

    .api-row input::placeholder { color: var(--ink3); }

    /* ── DROP ZONE ── */
    #drop-zone {
      border: 1.5px dashed var(--border2);
      border-radius: 10px;
      padding: 48px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      background: var(--surface);
    }

    #drop-zone:hover, #drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(200,71,42,0.03);
    }

    #drop-zone input[type=file] {
      position: absolute; inset: 0;
      opacity: 0; cursor: pointer;
      width: 100%; height: 100%;
    }

    .drop-icon {
      font-size: 32px;
      margin-bottom: 12px;
      opacity: 0.5;
    }

    .drop-text {
      font-size: 13px;
      color: var(--ink2);
      line-height: 1.7;
      font-weight: 300;
    }

    .drop-text strong {
      color: var(--accent);
      font-weight: 500;
    }

    /* ── PREVIEW ── */
    #preview-wrap { display: none; position: relative; }

    #preview-img {
      width: 100%;
      border-radius: 8px;
      display: block;
      max-height: 260px;
      object-fit: cover;
      border: 1px solid var(--border);
    }

    .preview-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 10px;
    }

    #file-name {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--ink3);
    }

    .btn-clear {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--ink3);
      font-size: 11px;
      font-family: var(--mono);
      padding: 4px 10px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-clear:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── RUN BUTTON ── */
    #run-btn {
      width: 100%;
      margin-top: 20px;
      padding: 13px;
      background: var(--ink);
      color: #fff;
      border: none;
      border-radius: 9px;
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.18s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      letter-spacing: 0.01em;
    }

    #run-btn:hover:not(:disabled) {
      background: var(--accent);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(200,71,42,0.25);
    }

    #run-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    /* ── RESULTS ── */
    .results-card { position: sticky; top: 88px; }

    /* Empty state */
    .empty-state {
      padding: 64px 32px;
      text-align: center;
    }

    .empty-icon {
      font-size: 40px;
      margin-bottom: 16px;
      opacity: 0.25;
    }

    .empty-text {
      font-family: var(--serif);
      font-size: 1.05rem;
      color: var(--ink3);
      font-weight: 300;
      font-style: italic;
      line-height: 1.6;
    }

    /* Status message */
    #status {
      display: none;
      font-family: var(--mono);
      font-size: 11px;
      padding: 10px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    #status.info {
      display: block;
      background: rgba(200,71,42,0.06);
      border: 1px solid rgba(200,71,42,0.2);
      color: var(--accent);
    }

    #status.error {
      display: block;
      background: rgba(200,71,42,0.06);
      border: 1px solid rgba(200,71,42,0.3);
      color: var(--accent);
    }

    /* ── IMAGE COMPARISON ── */
    .image-comparison {
      display: none;
      margin-bottom: 28px;
    }

    .image-comparison.visible { display: block; }

    .comparison-label {
      font-family: var(--mono);
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--ink3);
      margin-bottom: 12px;
    }

    .comparison-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .img-frame {
      position: relative;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--tag-bg);
    }

    .img-frame img {
      width: 100%;
      display: block;
      height: 180px;
      object-fit: cover;
    }

    .img-tag {
      position: absolute;
      bottom: 8px; left: 8px;
      background: rgba(26,23,20,0.75);
      color: #fff;
      font-family: var(--mono);
      font-size: 9px;
      padding: 3px 7px;
      border-radius: 4px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      backdrop-filter: blur(4px);
    }

    .img-tag.denoised {
      background: rgba(45,122,79,0.85);
    }

    /* ── PREDICTION ── */
    .prediction-block {
      display: none;
    }

    .prediction-block.visible { display: block; }

    .pred-divider {
      height: 1px;
      background: var(--border);
      margin-bottom: 24px;
    }

    .pred-header {
      font-family: var(--mono);
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--ink3);
      margin-bottom: 10px;
    }

    .pred-class-name {
      font-family: var(--serif);
      font-size: 1.8rem;
      font-weight: 300;
      color: var(--ink);
      line-height: 1.2;
      margin-bottom: 20px;
      letter-spacing: -0.02em;
    }

    /* ── PROBABILITY BARS ── */
    .prob-section-label {
      font-family: var(--mono);
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--ink3);
      margin-bottom: 14px;
    }

    .prob-list { display: flex; flex-direction: column; gap: 9px; }

    .prob-row {
      display: flex;
      align-items: center;
      gap: 10px;
      opacity: 0;
      animation: fadeSlide 0.35s forwards;
    }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateX(-6px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .prob-name {
      font-size: 12px;
      color: var(--ink2);
      width: 200px;
      flex-shrink: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 300;
    }

    .prob-name.top {
      color: var(--ink);
      font-weight: 500;
    }

    .prob-track {
      flex: 1;
      height: 3px;
      background: var(--tag-bg);
      border-radius: 2px;
      overflow: hidden;
    }

    .prob-fill {
      height: 100%;
      border-radius: 2px;
      background: var(--border2);
      transition: width 0.7s cubic-bezier(0.16,1,0.3,1);
    }

    .prob-fill.top {
      background: var(--accent);
    }

    .prob-val {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--ink3);
      width: 36px;
      text-align: right;
      flex-shrink: 0;
    }

    .prob-val.top {
      color: var(--accent);
      font-weight: 500;
    }

    /* ── SPINNER ── */
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── RESPONSIVE ── */
    @media (max-width: 820px) {
      main {
        grid-template-columns: 1fr;
        padding: 24px 16px;
      }
      header { padding: 0 20px; }
      .results-card { position: static; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🫀</div>
    <span class="logo-text">Gallbladder Classifier</span>
  </div>
  <div class="header-divider"></div>
  <span class="header-sub">GAN + ViT Pipeline</span>
  <div class="header-right">
    <div class="status-dot" id="status-dot"></div>
    <span class="status-label" id="status-label">checking…</span>
  </div>
</header>

<main>

  <!-- LEFT: Input -->
  <div>
    <div class="card">
      <div class="card-header">
        <span class="card-title">Input</span>
      </div>
      <div class="card-body">

        <div class="api-row">
          <span class="api-label">API</span>
          <input id="api-url" type="text"
            placeholder="https://noman2110014-gallbladder-classifier.hf.space"
            value="https://noman2110014-gallbladder-classifier.hf.space"/>
        </div>

        <div id="drop-zone">
          <input type="file" id="file-input" accept="image/*"/>
          <div class="drop-icon">⬆︎</div>
          <p class="drop-text">Drop an ultrasound image here<br/><strong>or click to browse</strong></p>
        </div>

        <div id="preview-wrap">
          <img id="preview-img" alt="preview"/>
          <div class="preview-actions">
            <span id="file-name"></span>
            <button class="btn-clear" id="clear-btn">✕ clear</button>
          </div>
        </div>

        <button id="run-btn" disabled>Analyse image</button>

      </div>
    </div>
  </div>

  <!-- RIGHT: Results -->
  <div>
    <div class="card results-card">
      <div class="card-header">
        <span class="card-title">Results</span>
      </div>
      <div class="card-body">

        <div id="status"></div>

        <div class="empty-state" id="empty-state">
          <div class="empty-icon">🔬</div>
          <p class="empty-text">Upload an ultrasound image<br/>and run inference to see results</p>
        </div>

        <!-- Image comparison -->
        <div class="image-comparison" id="img-comparison">
          <div class="comparison-label">Image processing</div>
          <div class="comparison-grid">
            <div class="img-frame">
              <img id="input-out" alt="input"/>
              <span class="img-tag">Original</span>
            </div>
            <div class="img-frame">
              <img id="denoised-out" alt="denoised"/>
              <span class="img-tag denoised">GAN Denoised</span>
            </div>
          </div>
        </div>

        <!-- Prediction -->
        <div class="prediction-block" id="pred-block">
          <div class="pred-divider"></div>
          <div class="pred-header">Predicted condition</div>
          <div class="pred-class-name" id="pred-class">—</div>

          <div class="prob-section-label">All classes</div>
          <div class="prob-list" id="prob-bars"></div>
        </div>

      </div>
    </div>
  </div>

</main>

<script>
  let selectedFile = null;

  const dropZone    = document.getElementById('drop-zone');
  const fileInput   = document.getElementById('file-input');
  const previewWrap = document.getElementById('preview-wrap');
  const previewImg  = document.getElementById('preview-img');
  const fileNameEl  = document.getElementById('file-name');
  const runBtn      = document.getElementById('run-btn');

  // Check API status on load
  async function checkStatus() {
    const apiUrl = document.getElementById('api-url').value.trim().replace(/\/$/, '');
    try {
      const res = await fetch(`${apiUrl}/`);
      if (res.ok) {
        document.getElementById('status-dot').classList.add('online');
        document.getElementById('status-label').textContent = 'online';
      } else { throw new Error(); }
    } catch {
      document.getElementById('status-dot').classList.remove('online');
      document.getElementById('status-label').textContent = 'offline';
    }
  }

  checkStatus();
  document.getElementById('api-url').addEventListener('change', checkStatus);

  // File handling
  fileInput.addEventListener('change', e => loadFile(e.target.files[0]));
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    loadFile(e.dataTransfer.files[0]);
  });

  document.getElementById('clear-btn').addEventListener('click', () => {
    selectedFile = null;
    previewWrap.style.display = 'none';
    dropZone.style.display = 'block';
    fileInput.value = '';
    runBtn.disabled = true;
    clearResults();
  });

  function loadFile(file) {
    if (!file || !file.type.startsWith('image/')) return;
    selectedFile = file;
    const reader = new FileReader();
    reader.onload = e => {
      previewImg.src = e.target.result;
      previewWrap.style.display = 'block';
      dropZone.style.display = 'none';
      fileNameEl.textContent = file.name + ' · ' + (file.size / 1024).toFixed(0) + ' KB';
      runBtn.disabled = false;
    };
    reader.readAsDataURL(file);
  }

  // Inference
  runBtn.addEventListener('click', async () => {
    if (!selectedFile) return;
    const apiUrl = document.getElementById('api-url').value.trim().replace(/\/$/, '');
    if (!apiUrl) { showStatus('error', 'Please enter the API URL.'); return; }

    setLoading(true);
    clearResults();

    const formData = new FormData();
    formData.append('file', selectedFile);

    try {
      showStatus('info', 'Running GAN denoising + ViT classification…');
      const res = await fetch(`${apiUrl}/predict`, { method: 'POST', body: formData });
      if (!res.ok) throw new Error(`Server error ${res.status}`);
      showResults(await res.json());
      hideStatus();
      checkStatus();
    } catch (err) {
      showStatus('error', err.message || 'Request failed — is the server running?');
    } finally {
      setLoading(false);
    }
  });

  function setLoading(on) {
    runBtn.disabled = on;
    runBtn.innerHTML = on
      ? '<div class="spinner"></div> Analysing…'
      : 'Analyse image';
  }

  function showStatus(type, msg) {
    const el = document.getElementById('status');
    el.className = type;
    el.textContent = msg;
  }

  function hideStatus() {
    const el = document.getElementById('status');
    el.className = '';
    el.style.display = 'none';
  }

  function clearResults() {
    document.getElementById('empty-state').style.display = 'block';
    document.getElementById('img-comparison').classList.remove('visible');
    document.getElementById('pred-block').classList.remove('visible');
    document.getElementById('prob-bars').innerHTML = '';
  }

  function showResults(data) {
    document.getElementById('empty-state').style.display = 'none';

    // Images
    if (data.input_image && data.denoised_image) {
      document.getElementById('input-out').src = data.input_image;
      document.getElementById('denoised-out').src = data.denoised_image;
      document.getElementById('img-comparison').classList.add('visible');
    }

    // Prediction
    document.getElementById('pred-class').textContent = data.prediction;
    document.getElementById('pred-block').classList.add('visible');

    // Probability bars
    const container = document.getElementById('prob-bars');
    container.innerHTML = '';
    data.probabilities.forEach((item, i) => {
      const pct = (item.probability * 100).toFixed(1);
      const top = i === 0;
      const row = document.createElement('div');
      row.className = 'prob-row';
      row.style.animationDelay = `${i * 45}ms`;
      row.innerHTML = `
        <div class="prob-name${top ? ' top' : ''}" title="${item.class}">${item.class}</div>
        <div class="prob-track"><div class="prob-fill${top ? ' top' : ''}" style="width:${pct}%"></div></div>
        <div class="prob-val${top ? ' top' : ''}">${pct}%</div>`;
      container.appendChild(row);
    });
  }
</script>
</body>
</html>
